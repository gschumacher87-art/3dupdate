<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Flight Snake</title>
<link rel="stylesheet" href="project-folder/styles.css">
</head>
<body>
<canvas id="game" width="400" height="400"></canvas>
<div id="score">Score: 0</div>
<button id="startBtn">Start Game</button>

<!-- On-screen arrow control -->
<div id="controls">
  <button id="up">↑</button>
  <div id="middle-row">
    <button id="left">←</button>
    <button id="down">↓</button>
    <button id="right">→</button>
  </div>
</div>

<!-- Point script to project folder -->
<script type="module" src="project-folder/app.js"></script>
</body>
</html>
