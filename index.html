<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Flight Snake</title>
<link rel="stylesheet" href="styles.css">
<style>
  body {
    margin: 0;
    background: #111;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: sans-serif;
  }

  canvas {
    border: 2px solid #fff;
    background: #222;
    margin-top: 20px;
  }

  #score {
    margin-top: 10px;
    font-size: 20px;
  }

  #controls {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #middle-row {
    display: flex;
    gap: 10px;
    margin-top: 5px;
  }

  button {
    width: 50px;
    height: 50px;
    font-size: 24px;
    border-radius: 8px;
    border: none;
    background: #444;
    color: #fff;
  }

  button:active {
    background: #666;
  }
</style>
</head>
<body>
<canvas id="game" width="400" height="400"></canvas>
<div id="score">Score: 0</div>
<button id="startBtn">Start Game</button>

<!-- On-screen arrow control -->
<div id="controls">
  <button id="up">↑</button>
  <div id="middle-row">
    <button id="left">←</button>
    <button id="down">↓</button>
    <button id="right">→</button>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
